<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - GMAHK Jakarta Conference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d14;
            --panel: #111827;
            --panel-2: #161d2e;
            --border: #243447;
            --text: #f0f6ff;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --danger: #f43f5e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, sans-serif;
            padding: 24px;
        }
        .login-box {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.35);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: #1d4ed8;
            display: grid;
            place-items: center;
            font-weight: 800;
        }
        h1 { font-size: 18px; margin: 0; }
        p { color: var(--muted); font-size: 12px; margin: 4px 0 0; }
        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
            margin: 14px 0 6px;
        }
        input {
            width: 100%;
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 11px 12px;
            font: inherit;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%;
            margin-top: 18px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 800;
            padding: 11px 14px;
            cursor: pointer;
        }
        button:disabled { opacity: .65; cursor: wait; }
        .error {
            display: none;
            margin-top: 14px;
            color: var(--danger);
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main class="login-box">
        <div class="brand">
            <div class="brand-mark">G</div>
            <div>
                <h1>Login Admin</h1>
                <p>GMAHK Jakarta Conference</p>
            </div>
        </div>
        <form id="loginForm">
            <label for="login">Username atau Email</label>
            <input id="login" name="login" autocomplete="username" required autofocus>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button id="loginBtn" type="submit">Masuk</button>
            <div id="errorBox" class="error"></div>
        </form>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');
            btn.disabled = true;
            btn.textContent = 'Memeriksa...';
            errorBox.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        login: document.getElementById('login').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Login gagal.');
                window.location.href = '/';
            } catch (error) {
                errorBox.textContent = error.message;
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Masuk';
            }
        });
    </script>
</body>
</html>
