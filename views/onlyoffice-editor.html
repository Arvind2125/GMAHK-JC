<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyOffice Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: Inter, Arial, sans-serif; background: #0f172a; }
        #editor { width: 100vw; height: 100vh; }
        .status {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #dbeafe;
            text-align: center;
        }
        .status-box {
            width: min(560px, 100%);
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.92);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }
        .status-box h1 { font-size: 20px; margin-bottom: 10px; color: #ffffff; }
        .status-box p { font-size: 14px; line-height: 1.6; color: #cbd5e1; margin-bottom: 10px; }
        .status-box code {
            display: inline-block;
            margin-top: 6px;
            padding: 5px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #bfdbfe;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="editor">
        <div class="status">
            <div class="status-box">
                <h1>Memuat OnlyOffice...</h1>
                <p>Menyiapkan workbook untuk editor spreadsheet.</p>
            </div>
        </div>
    </div>

    <script>
    function showStatus(title, message, details) {
        document.getElementById('editor').innerHTML = `
            <div class="status">
                <div class="status-box">
                    <h1>${title}</h1>
                    <p>${message}</p>
                    ${details ? `<p><code>${details}</code></p>` : ''}
                </div>
            </div>`;
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            let settled = false;
            const cleanup = () => {
                window.removeEventListener('error', onWindowError, true);
            };
            const fail = (error) => {
                if (settled) return;
                settled = true;
                cleanup();
                reject(error);
            };
            const onWindowError = (event) => {
                if (event.filename && event.filename !== src) return;
                const message = String(event.message || '');
                if (message.includes('Unexpected token') || message.includes('SyntaxError')) {
                    fail(new Error('Script OnlyOffice berisi HTML atau format salah. Periksa ONLYOFFICE_DOCUMENT_SERVER_URL dan pastikan Document Server berjalan.'));
                }
            };
            window.addEventListener('error', onWindowError, true);
            script.src = src;
            script.onload = () => {
                if (settled) return;
                settled = true;
                cleanup();
                resolve();
            };
            script.onerror = () => fail(new Error('Gagal memuat script OnlyOffice dari ' + src));
            document.head.appendChild(script);
        });
    }

    async function readJsonResponse(res) {
        const contentType = res.headers.get('content-type') || '';
        const bodyText = await res.text();
        if (!contentType.includes('application/json')) {
            const looksLikeHtml = bodyText.trim().startsWith('<');
            throw new Error(
                looksLikeHtml
                    ? 'Server mengembalikan HTML, bukan JSON. Coba login ulang lalu restart server Node agar route OnlyOffice terbaru aktif.'
                    : 'Server mengembalikan format tidak dikenal dari endpoint config OnlyOffice.'
            );
        }
        try {
            return JSON.parse(bodyText);
        } catch (error) {
            throw new Error('Respons config OnlyOffice bukan JSON valid: ' + error.message);
        }
    }

    function verifyOnlyOfficeScriptUrl(src) {
        const url = new URL(src, window.location.href);
        if (url.origin === window.location.origin && url.pathname.startsWith('/web-apps/')) {
            throw new Error(
                'URL Document Server tidak mengarah ke OnlyOffice API. Pastikan ONLYOFFICE_DOCUMENT_SERVER_URL berisi alamat Document Server, misalnya http://localhost:8080, bukan http://localhost:3006.'
            );
        }
    }

    async function bootOnlyOffice() {
        const params = new URLSearchParams(window.location.search);
        const reportId = params.get('reportId');
        if (!reportId) {
            showStatus('Report tidak ditemukan', 'URL editor membutuhkan parameter reportId.');
            return;
        }

        try {
            const res = await fetch(`/api/onlyoffice/report/${encodeURIComponent(reportId)}/config`, {
                credentials: 'same-origin',
                cache: 'no-store'
            });
            const config = await readJsonResponse(res);
            if (!res.ok) {
                const setup = config.setup ? `${config.setup.env}=${config.setup.example}` : '';
                const details = [config.details, setup].filter(Boolean).join(' | ');
                showStatus('OnlyOffice belum siap', config.message || 'Konfigurasi editor belum tersedia.', details);
                return;
            }

            verifyOnlyOfficeScriptUrl(config.scriptUrl);
            await loadScript(config.scriptUrl);
            if (!window.DocsAPI) {
                showStatus('OnlyOffice tidak tersedia', 'Script Document Server termuat, tetapi DocsAPI tidak ditemukan.');
                return;
            }

            document.getElementById('editor').innerHTML = '';
            new DocsAPI.DocEditor('editor', config);
        } catch (error) {
            showStatus('Gagal membuka editor', error.message);
        }
    }

    bootOnlyOffice();
    </script>
</body>
</html>
